edition: 3.0.0
name: ai-photo-evaluator
access: default

resources:
  api:
    component: fc3
    props:
      region: cn-hangzhou
      functionName: ai-photo-evaluator-api
      description: Secure Moonshot proxy for AI photo evaluator
      runtime: custom.debian10
      code: ./
      handler: index.handler
      timeout: 240
      memorySize: 1024
      diskSize: 512
      cpu: 1
      instanceConcurrency: 20
      customRuntimeConfig:
        command:
          - npm
          - start
        port: 9000
      environmentVariables:
        NODE_ENV: production
        PORT: "9000"
        MAX_IMAGE_BYTES: "5242880"
        MAX_REQUEST_BYTES: "8388608"
        MOONSHOT_TOTAL_TIMEOUT_MS: "180000"
        RATE_LIMIT_IP_HOURLY: "3"
        RATE_LIMIT_IP_DAILY: "10"
        RATE_LIMIT_GLOBAL_DAILY: "100"
        RESULT_TTL_SECONDS: "600"
        LOCK_TTL_SECONDS: "240"
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - POST
              - OPTIONS
              - GET
